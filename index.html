<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 貼圖互動裁切工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        header { background: #00c300; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 24px; }
        
        /* 使用說明欄位 */
        .instruction-box { background: #e8f5e9; border-left: 5px solid #00c300; padding: 15px; margin-bottom: 25px; border-radius: 4px; font-size: 14px; }
        .instruction-box h4 { margin: 0 0 10px 0; color: #1b5e20; display: flex; align-items: center; gap: 8px; }
        .instruction-box ul { margin: 0; padding-left: 20px; }
        .instruction-box li { margin-bottom: 5px; }

        .controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 20px; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .preview-item { position: relative; background: #fff; border: 2px solid #eef0f2; padding: 12px; border-radius: 12px; text-align: center; transition: all 0.3s; }
        .preview-item.can-edit { cursor: pointer; }
        .preview-item.can-edit:hover { border-color: #00c300; transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .preview-item img { max-width: 100%; height: auto; border-radius: 6px; background: #fafafa; }
        .preview-item span { font-size: 13px; color: #666; display: block; margin-top: 10px; font-weight: bold; }
        
        .tag { display: inline-block; padding: 2px 6px; font-size: 10px; border-radius: 4px; color: white; margin-bottom: 5px; }
        .tag-adjust { background: #00c300; }
        .tag-lock { background: #999; }

        .btn-delete { position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; border: none; border-radius: 50%; cursor: pointer; width: 26px; height: 26px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5; }
        
        button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-process { background: #00c300; }
        .btn-clear { background: #ff4d4d; } /* 改為紅色 */
        .btn-sticker { background: #1a73e8; }
        .btn-emoji { background: #202124; }
        button:hover { opacity: 0.85; transform: scale(1.02); }

        #cropperModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 650px; background: white; padding: 25px; border-radius: 15px; }
        .crop-container { width: 100%; height: 450px; background-color: #222; overflow: hidden; border-radius: 8px; }
        .modal-btns { margin-top: 20px; display: flex; justify-content: flex-end; gap: 12px; }

        select, input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <header>LINE 貼圖互動裁切工具</header>

    <div class="instruction-box">
        <h4>💡 使用說明</h4>
        <ul>
            <li><strong>上傳與裁切：</strong>選擇照片後，設定裁切數量（例如 6x4）並點擊「處理所有圖片」。</li>
            <li><strong>微調位置：</strong>點擊帶有 <span style="color:#00c300; font-weight:bold;">綠色標籤</span> 的圖片，可開啟視窗手動縮放與移動裁切區域。</li>
            <li><strong>縮圖說明：</strong><code>tab.png</code> 為聊天室分頁圖，系統會自動由原圖生成，不開放手動微調。</li>
            <li><strong>移除圖片：</strong>點擊圖片右上角的紅圈 <strong>×</strong> 即可單張移除。</li>
            <li><strong>批次下載：</strong>完成後，點擊下方下載按鈕，系統會自動打包成 ZIP。</li>
        </ul>
    </div>
    
    <div class="controls">
        <input type="file" id="uploadInput" accept="image/*">
        
        <div class="control-group">
            裁切方式:
            <select id="gridType" onchange="toggleCustomFields()">
                <option value="2x2">2 x 2</option>
                <option value="3x3">3 x 3</option>
                <option value="custom" selected>自訂比例</option>
            </select>
        </div>

        <div id="customInputs" class="control-group">
            寬 <input type="number" id="cols" value="6" min="1"> x 
            高 <input type="number" id="rows" value="4" min="1">
        </div>
        
        <button class="btn-process" onclick="processImages()">處理所有圖片</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
        <button class="btn-sticker" onclick="downloadZip('sticker')">下載貼圖格式</button>
        <button class="btn-emoji" onclick="downloadZip('emoji')">下載表情貼格式</button>
    </div>

    <div class="results-section">
        <div class="grid" id="previewGrid"></div>
    </div>
</div>

<div id="cropperModal">
    <div class="modal-content">
        <h3 style="margin-top:0">微調貼圖範圍</h3>
        <div class="crop-container">
            <img id="editingImage">
        </div>
        <div class="modal-btns">
            <button style="background:#eee; color:#333;" onclick="closeModal()">取消</button>
            <button style="background:#00c300;" onclick="saveCrop()">儲存套用</button>
        </div>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let currentOriginalImage = null; 
    let activePreviewImg = null;    
    let cropper = null;

    function toggleCustomFields() {
        const type = document.getElementById('gridType').value;
        document.getElementById('customInputs').style.display = (type === 'custom') ? 'flex' : 'none';
    }

    function clearAll() {
        if (confirm("確定要清空目前所有裁切好的圖片嗎？")) {
            document.getElementById('previewGrid').innerHTML = '';
            document.getElementById('uploadInput').value = '';
            currentOriginalImage = null;
        }
    }

    function processImages() {
        const file = document.getElementById('uploadInput').files[0];
        if (!file) return alert('請先選擇照片檔案');

        const reader = new FileReader();
        reader.onload = (e) => {
            currentOriginalImage = e.target.result;
            const img = new Image();
            img.onload = () => generateAllImages(img);
            img.src = currentOriginalImage;
        };
        reader.readAsDataURL(file);
    }

    function generateAllImages(img) {
        const grid = document.getElementById('previewGrid');
        grid.innerHTML = '';
        
        const gridType = document.getElementById('gridType').value;
        let cols, rows;
        if (gridType === 'custom') {
            cols = parseInt(document.getElementById('cols').value) || 1;
            rows = parseInt(document.getElementById('rows').value) || 1;
        } else {
            const parts = gridType.split('x');
            cols = parseInt(parts[0]);
            rows = parseInt(parts[1]);
        }

        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const cellW = img.width / cols;
        const cellH = img.height / rows;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                canvas.width = cellW;
                canvas.height = cellH;
                ctx.drawImage(img, c * cellW, r * cellH, cellW, cellH, 0, 0, cellW, cellH);
                addPreviewItem(canvas.toDataURL(), `p_${r+1}_${c+1}.png`, true);
            }
        }
        addPreviewItem(currentOriginalImage, 'main.png', true);
        
        canvas.width = 96; canvas.height = 74;
        ctx.drawImage(img, 0, 0, 96, 74);
        addPreviewItem(canvas.toDataURL(), 'tab.png', false);
    }

    function addPreviewItem(src, name, isAdjustable) {
        const grid = document.getElementById('previewGrid');
        const div = document.createElement('div');
        div.className = 'preview-item' + (isAdjustable ? ' can-edit' : '');
        
        const tag = isAdjustable ? '<span class="tag tag-adjust">可調整</span>' : '<span class="tag tag-lock">縮圖鎖定</span>';

        div.onclick = (e) => {
            if (e.target.tagName === 'BUTTON') return;
            if (isAdjustable) openCropper(div.querySelector('img'));
        };

        div.innerHTML = `
            ${tag}
            <button class="btn-delete" title="移除" onclick="this.parentElement.remove(); event.stopPropagation();">×</button>
            <img src="${src}">
            <span>${name}</span>
        `;
        grid.appendChild(div);
    }

    function openCropper(imgElement) {
        activePreviewImg = imgElement;
        const modal = document.getElementById('cropperModal');
        const editingImg = document.getElementById('editingImage');
        editingImg.src = currentOriginalImage; 
        modal.style.display = 'flex';

        if (cropper) cropper.destroy();
        cropper = new Cropper(editingImg, {
            aspectRatio: 1, 
            viewMode: 1,
            autoCropArea: 0.8
        });
    }

    function closeModal() {
        document.getElementById('cropperModal').style.display = 'none';
        if (cropper) cropper.destroy();
    }

    function saveCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 320, height: 320 });
        activePreviewImg.src = canvas.toDataURL('image/png');
        closeModal();
    }

    async function downloadZip(type) {
        const zip = new JSZip();
        const images = document.querySelectorAll('.preview-item img');
        if (images.length === 0) return alert('目前沒有圖片可以下載');

        const size = (type === 'emoji') ? 180 : 320;
        const finalCanvas = document.createElement('canvas');
        const fCtx = finalCanvas.getContext('2d');
        finalCanvas.width = size;
        finalCanvas.height = size;

        for (let img of images) {
            const name = img.nextElementSibling.innerText;
            fCtx.clearRect(0, 0, size, size);
            fCtx.drawImage(img, 0, 0, size, size);
            const blob = await new Promise(resolve => finalCanvas.toBlob(resolve, 'image/png'));
            zip.file(name, blob);
        }

        zip.generateAsync({type: "blob"}).then(content => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `line_${type}_pack.zip`;
            a.click();
        });
    }
</script>
</body>
</html>
